---
- name: Check openvswitch_vswitchd runtime marker for ensure phase
  become: true
  stat:
    path: "{{ openvswitch_vswitchd_runtime_marker_file }}"
  register: _ensure_vswitchd_runtime_marker
  changed_when: false
  failed_when: false
  when:
    - openvswitch_vswitchd_protect_runtime | bool

- name: Set openvswitch_vswitchd ensure-phase runtime protection state
  set_fact:
    _ensure_vswitchd_runtime_protected: >-
      {{
        (openvswitch_vswitchd_protect_runtime | bool)
        and ((_ensure_vswitchd_runtime_marker | default({})).get('stat', {}).get('exists', false) | bool)
        and not (openvswitch_vswitchd_break_glass | bool)
      }}

- name: Ensure Open vSwitch containers exist before systemd and post-config
  include_tasks: roles/common/tasks/_ensure_service_container.yml
  vars:
    service_name: "{{ item.key }}"
    service: "{{ item.value }}"
    ensure_container_action: >-
      {{ 'recreate_container'
         if item.key == 'openvswitch-db-server' and openvswitch_force_create_db_container | bool
         else 'recreate_or_restart_container' }}
  loop: "{{ openvswitch_services | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.value | service_enabled_and_mapped_to_host
    - not (item.key == 'openvswitch-vswitchd' and _ensure_vswitchd_runtime_protected | bool)

- name: Log skipped openvswitch_vswitchd ensure due to runtime protection
  debug:
    msg: >-
      Runtime protection marker {{ openvswitch_vswitchd_runtime_marker_file }} is present.
      Skipping recreate_or_restart_container for openvswitch_vswitchd during ensure phase.
      Set openvswitch_vswitchd_break_glass=true to override.
  when:
    - _ensure_vswitchd_runtime_protected | bool
